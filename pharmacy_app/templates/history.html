<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice History - CDH Pharmacy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💊%3C/text%3E%3C/svg%3E">
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <h1 class="text-2xl font-bold text-blue-600">💊 CDH Pharmacy</h1>
                    </div>
                    <div class="ml-10">
                        <div class="nav-tabs flex space-x-8">
                            <a href="/" class="nav-tab">POS</a>
                            <a href="/history" class="nav-tab active">History</a>
                            <a href="/reports" class="nav-tab">Reports</a>
                            <a href="/manage" class="nav-tab">Manage</a>
                        </div>
                    </div>
                </div>
                <div class="text-sm text-gray-500">
                    <span id="currentDateTime"></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-6">
        <!-- Page Header -->
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">📜 Invoice History</h1>
            <p class="text-gray-600">Search, view, and reprint past invoices</p>
        </div>

        <!-- Search Filters -->
        <div class="card mb-6">
            <div class="card-header">
                <h2 class="text-lg font-semibold text-gray-900">🔍 Search Invoices</h2>
            </div>
            <div class="card-body">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Search by Invoice Number or Patient Name</label>
                        <input 
                            type="text" 
                            id="historySearch" 
                            placeholder="Enter invoice number or patient name..."
                            class="form-input"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">From Date</label>
                        <input type="date" id="startDate" class="form-input">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">To Date</label>
                        <input type="date" id="endDate" class="form-input">
                    </div>
                </div>
                <div class="mt-4 flex space-x-3">
                    <button onclick="HistoryManager.searchInvoices()" class="btn btn-primary">
                        🔍 Search
                    </button>
                    <button onclick="clearSearchFilters()" class="btn btn-outline">
                        🗑️ Clear
                    </button>
                    <button onclick="exportToCSV()" class="btn btn-secondary">
                        📊 Export CSV
                    </button>
                </div>
            </div>
        </div>

        <!-- Invoice List -->
        <div class="card">
            <div class="card-header">
                <h2 class="text-lg font-semibold text-gray-900">Recent Invoices</h2>
            </div>
            <div class="card-body p-0">
                <div id="invoiceHistory">
                    <div class="text-center py-8 text-gray-500">
                        <div class="spinner mx-auto mb-4"></div>
                        Loading invoices...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Invoice Details Modal -->
    <div id="invoiceModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-screen overflow-y-auto">
                <div id="invoiceModalContent">
                    <!-- Modal content will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Update current date time
        function updateDateTime() {
            const now = new Date();
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('currentDateTime').textContent = now.toLocaleDateString('en-US', options);
        }

        // Set default date range (last 30 days)
        function setDefaultDateRange() {
            const today = new Date();
            const thirtyDaysAgo = new Date(today.getTime() - (30 * 24 * 60 * 60 * 1000));
            
            document.getElementById('endDate').value = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        }

        // Clear search filters
        function clearSearchFilters() {
            document.getElementById('historySearch').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            HistoryManager.searchInvoices();
        }

        // Export to CSV
        async function exportToCSV() {
            try {
                const query = document.getElementById('historySearch').value.trim();
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;

                const params = new URLSearchParams();
                if (query) params.append('q', query);
                if (startDate) params.append('start_date', startDate);
                if (endDate) params.append('end_date', endDate);

                const response = await fetch(`/api/search_invoices?${params}`);
                const invoices = await response.json();

                if (invoices.length === 0) {
                    PharmacyApp.showAlert('No invoices to export', 'warning');
                    return;
                }

                // Create CSV content
                const headers = ['Invoice Number', 'Date', 'Patient Name', 'Phone', 'Total', 'Discount'];
                const csvContent = [
                    headers.join(','),
                    ...invoices.map(inv => [
                        `"${inv.invoice_number}"`,
                        `"${new Date(inv.created_at).toLocaleDateString()}"`,
                        `"${inv.patient_name || ''}"`,
                        `"${inv.patient_phone || ''}"`,
                        inv.total,
                        inv.discount
                    ].join(','))
                ].join('\n');

                // Download CSV
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `invoices_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);

                PharmacyApp.showAlert('CSV exported successfully', 'success');
            } catch (error) {
                console.error('Export error:', error);
                PharmacyApp.showAlert('Failed to export CSV', 'error');
            }
        }

        // Enhanced search with enter key
        document.addEventListener('DOMContentLoaded', function() {
            updateDateTime();
            setInterval(updateDateTime, 60000);
            setDefaultDateRange();

            // Search on enter key
            document.getElementById('historySearch').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    HistoryManager.searchInvoices();
                }
            });

            // Date change triggers search
            document.getElementById('startDate').addEventListener('change', HistoryManager.searchInvoices);
            document.getElementById('endDate').addEventListener('change', HistoryManager.searchInvoices);

            // Close modal on escape
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && !document.getElementById('invoiceModal').classList.contains('hidden')) {
                    HistoryManager.closeModal();
                }
            });

            // Close modal on background click
            document.getElementById('invoiceModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    HistoryManager.closeModal();
                }
            });
        });

        // Quick date filters
        function setQuickDateFilter(days) {
            const today = new Date();
            const pastDate = new Date(today.getTime() - (days * 24 * 60 * 60 * 1000));
            
            document.getElementById('endDate').value = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = pastDate.toISOString().split('T')[0];
            
            HistoryManager.searchInvoices();
        }

        // Add quick filter buttons dynamically
        document.addEventListener('DOMContentLoaded', function() {
            const quickFilters = document.createElement('div');
            quickFilters.className = 'mt-2 flex flex-wrap gap-2';
            quickFilters.innerHTML = `
                <button onclick="setQuickDateFilter(1)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">Today</button>
                <button onclick="setQuickDateFilter(7)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">Last 7 days</button>
                <button onclick="setQuickDateFilter(30)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">Last 30 days</button>
                <button onclick="setQuickDateFilter(90)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">Last 3 months</button>
            `;
            
            document.querySelector('.card-body .mt-4').insertAdjacentElement('afterend', quickFilters);
        });
    </script>
</body>
</html>
